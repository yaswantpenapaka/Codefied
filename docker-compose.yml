services:
  # Optional for local dev only — production uses MongoDB Atlas (free M0 tier)
  mongo:
    image: mongo:7
    container_name: codefied-mongo
    profiles: ["local-db"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: codefied-redis
    # No host ports — Redis is internal-only (backend uses REDIS_HOST=redis).
    command:
      [
        "redis-server",
        "--maxmemory",
        "64mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--save",
        "",
        "--appendonly",
        "no",
      ]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codefied-backend
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_OPTIONS: --max-old-space-size=384
    ports:
      - "4000:4000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  mongo-data: