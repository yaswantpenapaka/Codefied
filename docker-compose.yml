services:
  # Optional for local dev only — production uses MongoDB Atlas (free M0 tier)
  mongo:
    image: mongo:7
    container_name: codefied-mongo
    profiles: ["local-db"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: codefied-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codefied-backend
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data: